<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorta.Fit - Setup Wizard</title>
<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg: #0d1117;
  --card: #161b22;
  --border: #30363d;
  --text: #e6edf3;
  --text-muted: #8b949e;
  --accent: #58a6ff;
  --accent-hover: #79b8ff;
  --success: #3fb950;
  --error: #f85149;
  --warning: #d29922;
  --input-bg: #0d1117;
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  padding: 24px 16px;
}

.container {
  max-width: 720px;
  margin: 0 auto;
}

/* Step indicator */
.step-indicator {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  margin-bottom: 32px;
  flex-wrap: wrap;
}

.step-dot-group {
  display: flex;
  align-items: center;
}

.step-dot {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-muted);
  background: var(--card);
  transition: all 0.3s ease;
  flex-shrink: 0;
}

.step-dot.active {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(88, 166, 255, 0.1);
}

.step-dot.completed {
  border-color: var(--success);
  background: var(--success);
  color: #fff;
}

.step-line {
  width: 24px;
  height: 2px;
  background: var(--border);
  transition: background 0.3s ease;
  flex-shrink: 0;
}

.step-line.completed {
  background: var(--success);
}

/* Card */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 32px;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.card h2 {
  font-size: 22px;
  font-weight: 600;
  margin-bottom: 8px;
}

.card p {
  color: var(--text-muted);
  margin-bottom: 16px;
}

.card p.description {
  margin-bottom: 24px;
  line-height: 1.7;
}

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 10px 24px;
  border: none;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 600;
  font-family: var(--font);
  cursor: pointer;
  transition: all 0.2s ease;
  text-decoration: none;
  gap: 8px;
}

.btn-primary {
  background: var(--accent);
  color: #fff;
}

.btn-primary:hover:not(:disabled) {
  background: var(--accent-hover);
}

.btn-secondary {
  background: var(--border);
  color: var(--text);
}

.btn-secondary:hover:not(:disabled) {
  background: #484f58;
}

.btn-success {
  background: var(--success);
  color: #fff;
}

.btn-success:hover:not(:disabled) {
  background: #46c258;
}

.btn-danger {
  background: var(--error);
  color: #fff;
}

.btn-danger:hover:not(:disabled) {
  background: #fa6a63;
}

.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.btn-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 24px;
  gap: 12px;
}

.btn-row-right {
  display: flex;
  gap: 12px;
  margin-left: auto;
}

/* Forms */
.form-group {
  margin-bottom: 20px;
}

.form-group label {
  display: block;
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 6px;
  color: var(--text);
}

.form-group .hint {
  display: block;
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 6px;
}

input[type="text"],
input[type="password"],
input[type="email"],
input[type="number"],
select {
  width: 100%;
  padding: 10px 12px;
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 14px;
  font-family: var(--font);
  transition: border-color 0.2s ease;
}

input:focus, select:focus {
  outline: none;
  border-color: var(--accent);
}

select option {
  background: var(--card);
  color: var(--text);
}

select option:disabled {
  color: var(--text-muted);
}

/* Checklist */
.checklist {
  list-style: none;
  margin: 16px 0;
}

.checklist li {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  border: 1px solid var(--border);
  border-radius: 6px;
  margin-bottom: 8px;
  background: var(--bg);
}

.checklist li .status-icon {
  width: 20px;
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-weight: 700;
  font-size: 14px;
}

.checklist li .dep-name {
  font-weight: 600;
  min-width: 90px;
}

.checklist li .dep-version {
  color: var(--text-muted);
  font-size: 13px;
  margin-left: auto;
}

.status-pending { color: var(--warning); }
.status-ok { color: var(--success); }
.status-fail { color: var(--error); }

/* Status dot */
.dot {
  display: inline-block;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  margin-right: 8px;
  flex-shrink: 0;
}

.dot-green { background: var(--success); }
.dot-red { background: var(--error); }
.dot-yellow { background: var(--warning); }

/* Inline messages */
.msg {
  padding: 10px 14px;
  border-radius: 6px;
  font-size: 13px;
  margin-top: 12px;
  display: none;
}

.msg.visible {
  display: block;
}

.msg-success {
  background: rgba(63, 185, 80, 0.1);
  border: 1px solid rgba(63, 185, 80, 0.3);
  color: var(--success);
}

.msg-error {
  background: rgba(248, 81, 73, 0.1);
  border: 1px solid rgba(248, 81, 73, 0.3);
  color: var(--error);
}

.msg-info {
  background: rgba(88, 166, 255, 0.1);
  border: 1px solid rgba(88, 166, 255, 0.3);
  color: var(--accent);
}

/* Summary table */
.summary-section {
  margin-bottom: 20px;
}

.summary-section h3 {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 8px;
  color: var(--accent);
}

.summary-table {
  width: 100%;
  border-collapse: collapse;
}

.summary-table td {
  padding: 6px 0;
  font-size: 13px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}

.summary-table td:first-child {
  color: var(--text-muted);
  width: 180px;
  padding-right: 16px;
}

/* Checkboxes */
.checkbox-group {
  margin: 16px 0;
}

.checkbox-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 16px;
  border: 1px solid var(--border);
  border-radius: 6px;
  margin-bottom: 8px;
  background: var(--bg);
  cursor: pointer;
  transition: border-color 0.2s ease;
}

.checkbox-item:hover {
  border-color: var(--accent);
}

.checkbox-item input[type="checkbox"] {
  margin-top: 3px;
  accent-color: var(--accent);
  width: 16px;
  height: 16px;
  flex-shrink: 0;
}

.checkbox-item .recipe-info {
  flex: 1;
}

.checkbox-item .recipe-name {
  font-weight: 600;
  font-size: 14px;
  display: block;
}

.checkbox-item .recipe-desc {
  font-size: 12px;
  color: var(--text-muted);
  display: block;
  margin-top: 2px;
}

/* Pipeline diagram */
.pipeline {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  margin: 20px 0;
  flex-wrap: wrap;
  padding: 16px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
}

.pipeline-node {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
  text-align: center;
}

.pipeline-node.active {
  border-color: var(--accent);
  color: var(--accent);
}

.pipeline-arrow {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 4px;
  color: var(--text-muted);
  font-size: 11px;
  min-width: 50px;
}

.pipeline-arrow .arrow-line {
  width: 100%;
  height: 2px;
  background: var(--border);
  position: relative;
  margin: 2px 0;
}

.pipeline-arrow .arrow-line::after {
  content: '';
  position: absolute;
  right: -1px;
  top: -4px;
  border: 5px solid transparent;
  border-left-color: var(--border);
}

.pipeline-arrow .arrow-label {
  font-size: 10px;
  color: var(--accent);
  font-weight: 600;
}

.pipeline-arrow .arrow-label.human {
  color: var(--warning);
}

.pipeline-node.human-gate {
  border-color: var(--warning);
  border-style: dashed;
  color: var(--warning);
  font-size: 11px;
}

/* Dashboard */
.dashboard-status {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 20px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg);
  margin: 16px 0;
}

.dashboard-status .status-text {
  font-weight: 600;
  font-size: 16px;
}

.dashboard-detail {
  color: var(--text-muted);
  font-size: 13px;
  margin-top: 4px;
}

.dashboard-controls {
  display: flex;
  gap: 12px;
  margin: 16px 0;
}

/* Spinner */
.spinner {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* Header */
.header {
  text-align: center;
  margin-bottom: 32px;
}

.header h1 {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.5px;
}

.header .tagline {
  color: var(--text-muted);
  font-size: 14px;
  margin-top: 4px;
}

/* Responsive */
@media (max-width: 480px) {
  .card {
    padding: 20px;
  }
  .step-dot {
    width: 26px;
    height: 26px;
    font-size: 11px;
  }
  .step-line {
    width: 12px;
  }
  .btn-row {
    flex-direction: column;
  }
  .btn-row-right {
    margin-left: 0;
    width: 100%;
  }
  .btn-row-right .btn {
    flex: 1;
  }
  .pipeline {
    flex-direction: column;
    gap: 4px;
  }
  .pipeline-arrow {
    transform: rotate(90deg);
    min-width: 30px;
  }
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Sorta.Fit</h1>
    <div class="tagline">AI-powered sprint automation</div>
  </div>
  <div class="step-indicator" id="stepIndicator"></div>
  <div class="card" id="wizardCard"></div>
</div>

<script>
(function() {
  "use strict";

  var STEPS = [
    { label: "Welcome" },
    { label: "Dependencies" },
    { label: "Board" },
    { label: "Runners" },
    { label: "Configure" },
    { label: "Git" },
    { label: "Review" },
    { label: "Running" }
  ];

  var RUNNER_DEFS = [
    { id: "refine", name: "Refine", desc: "Break down cards into acceptance criteria and specs using AI analysis." },
    { id: "architect", name: "Architect", desc: "Analyze codebase and enrich refined specs with implementation plans." },
    { id: "code", name: "Code", desc: "Implement cards in isolated worktrees, open PRs automatically." },
    { id: "review", name: "Review", desc: "Review PR diffs and post structured feedback on GitHub." },
    { id: "triage", name: "Triage", desc: "Analyze bug reports, identify root causes, write triage reports." },
    { id: "bounce", name: "Bounce", desc: "Move cards with rejected PR reviews back for automated rework." }
  ];

  var state = {
    currentStep: 0,
    deps: null,
    connectionTested: false,
    boardDiscovered: false,
    discoveredStatuses: [],
    discoveredTransitions: [],
    config: {
      adapter: "jira",
      domain: "",
      email: "",
      apiToken: "",
      projectKey: "",
      baseBranch: "main",
      pollInterval: 60,
      recipes: ["refine", "code"],
      routing: {
        refine:    { fromId: "", toId: "", maxCards: 5 },
        architect: { fromId: "", toId: "", maxCards: 5 },
        code:      { fromId: "", toId: "", maxCards: 2 },
        review:  { fromId: "", toId: "", maxCards: 10 },
        triage:  { fromId: "", toId: "", maxCards: 5 },
        bounce:  { fromId: "", toId: "", maxCards: 10 }
      }
    },
    runner: {
      running: false,
      pid: null,
      pollTimer: null
    }
  };

  // ---- Utilities ----

  function $(sel, parent) {
    return (parent || document).querySelector(sel);
  }

  function escHtml(str) {
    var d = document.createElement("div");
    d.textContent = str;
    return d.innerHTML;
  }

  function showMsg(id, type, text) {
    var el = document.getElementById(id);
    if (!el) return;
    el.className = "msg visible msg-" + type;
    el.textContent = text;
  }

  function hideMsg(id) {
    var el = document.getElementById(id);
    if (!el) return;
    el.className = "msg";
    el.textContent = "";
  }

  async function apiPost(url, data) {
    var resp = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data || {})
    });
    if (!resp.ok) {
      var errText = "";
      try { errText = (await resp.json()).error || resp.statusText; }
      catch(e) { errText = resp.statusText; }
      throw new Error(errText);
    }
    return resp.json();
  }

  function statusName(id) {
    for (var i = 0; i < state.discoveredStatuses.length; i++) {
      if (state.discoveredStatuses[i].id === id) return state.discoveredStatuses[i].name;
    }
    return id || "(none)";
  }

  // ---- Step indicator ----

  function renderStepIndicator() {
    var html = "";
    for (var i = 0; i < STEPS.length; i++) {
      var cls = "step-dot";
      if (i < state.currentStep) cls += " completed";
      else if (i === state.currentStep) cls += " active";
      var inner = (i < state.currentStep) ? "&#10003;" : String(i + 1);
      html += '<div class="step-dot-group">';
      html += '<div class="' + cls + '" title="' + escHtml(STEPS[i].label) + '">' + inner + '</div>';
      if (i < STEPS.length - 1) {
        var lineCls = "step-line" + (i < state.currentStep ? " completed" : "");
        html += '<div class="' + lineCls + '"></div>';
      }
      html += '</div>';
    }
    document.getElementById("stepIndicator").innerHTML = html;
  }

  // ---- Navigation ----

  function goNext() {
    if (state.currentStep < STEPS.length - 1) {
      state.currentStep++;
      render();
    }
  }

  function goBack() {
    if (state.currentStep > 0) {
      state.currentStep--;
      render();
    }
  }

  function backBtn() {
    return '<button class="btn btn-secondary" onclick="window._wizBack()">Back</button>';
  }

  window._wizBack = goBack;

  // ---- Step 0: Welcome ----

  function renderWelcome() {
    return '' +
      '<h2>Welcome to Sorta.Fit</h2>' +
      '<p class="description">' +
        'Sorta.Fit connects your issue board to Claude Code for autonomous sprint execution. ' +
        'It polls your board, picks up cards, and runs them through a configurable pipeline: ' +
        'spec refinement, implementation in isolated worktrees, PR creation, code review, and bug triage.' +
      '</p>' +
      '<p class="description">' +
        'It runs in the background on your computer -- as long as it\'s on, your board keeps moving. ' +
        'Configure human review gates where you need them, or let it handle everything.' +
      '</p>' +
      '<p class="description" style="margin-bottom:0;font-size:13px;color:var(--text-muted)">' +
        'Sorta.Fit runs from inside your project repository so it can read your code, run your tests, and commit to branches. ' +
        'Drop the <code style="background:var(--bg);padding:2px 6px;border-radius:3px">sorta-fit</code> folder into your repo and run the setup from there.' +
      '</p>' +
      '<div class="btn-row">' +
        '<div class="btn-row-right">' +
          '<button class="btn btn-primary" onclick="window._wizNext0()">Get Started</button>' +
        '</div>' +
      '</div>';
  }

  window._wizNext0 = goNext;

  // ---- Step 1: Check Dependencies ----

  function renderDeps() {
    var items = ["git", "node", "claude", "gh"];
    // git-bash is added by the server on Windows
    if (state.deps && state.deps["git-bash"]) {
      items.push("git-bash");
    }
    var labels = { git: "Git", node: "Node.js", claude: "Claude CLI", gh: "GitHub CLI", "git-bash": "Git Bash (Windows)" };
    var html = '<h2>Check Dependencies</h2>' +
      '<p>Verifying that all required tools are installed on this system.</p>' +
      '<ul class="checklist" id="depList">';
    for (var i = 0; i < items.length; i++) {
      var key = items[i];
      var icon, iconCls, version;
      if (!state.deps) {
        icon = "...";
        iconCls = "status-pending";
        version = "checking";
      } else {
        var d = state.deps[key];
        if (d && d.found) {
          icon = "&#10003;";
          iconCls = "status-ok";
          version = d.version || "found";
        } else {
          icon = "&#10007;";
          iconCls = "status-fail";
          version = "not found";
        }
      }
      html += '<li>' +
        '<span class="status-icon ' + iconCls + '">' + icon + '</span>' +
        '<span class="dep-name">' + escHtml(labels[key]) + '</span>' +
        '<span class="dep-version">' + escHtml(version) + '</span>' +
        '</li>';
    }
    html += '</ul>';
    html += '<div id="depMsg" class="msg"></div>';

    var allOk = state.deps && state.deps.git && state.deps.git.found &&
                state.deps.node && state.deps.node.found &&
                state.deps.claude && state.deps.claude.found &&
                state.deps.gh && state.deps.gh.found &&
                (!state.deps["git-bash"] || state.deps["git-bash"].found);

    html += '<div class="btn-row">' +
      backBtn() +
      '<div class="btn-row-right">' +
        '<button class="btn btn-secondary" onclick="window._wizCheckDeps()">Re-check</button>' +
        '<button class="btn btn-primary" ' + (allOk ? '' : 'disabled') + ' onclick="window._wizNext1()">Next</button>' +
      '</div>' +
      '</div>';
    return html;
  }

  window._wizCheckDeps = async function() {
    state.deps = null;
    renderCard();
    try {
      var data = await apiPost("/api/check-dependencies");
      var depMap = {};
      if (data.dependencies) {
        for (var j = 0; j < data.dependencies.length; j++) {
          depMap[data.dependencies[j].name] = data.dependencies[j];
        }
      }
      state.deps = depMap;
      renderCard();
    } catch(e) {
      state.deps = {};
      renderCard();
      var hint = e.message === "Failed to fetch" ? " -- is the setup server running?" : "";
      showMsg("depMsg", "error", "Failed to check dependencies: " + e.message + hint);
    }
  };

  window._wizNext1 = goNext;

  // ---- Step 2: Board Connection + Discovery ----

  function renderBoard() {
    var c = state.config;
    var html = '<h2>Connect Board</h2>' +
      '<p>Configure the connection to your issue board. After testing the connection, we\'ll discover your board\'s statuses and transitions.</p>' +
      '<div class="form-group">' +
        '<label for="adapter">Adapter</label>' +
        '<select id="adapter" onchange="window._wizBoardField(\'adapter\', this.value)">' +
          '<option value="jira"' + (c.adapter === "jira" ? " selected" : "") + '>Jira</option>' +
          '<option value="linear" disabled>Linear (coming soon)</option>' +
          '<option value="github-issues" disabled>GitHub Issues (coming soon)</option>' +
        '</select>' +
      '</div>' +
      '<div class="form-group">' +
        '<label for="domain">Board Domain</label>' +
        '<span class="hint">e.g. yourteam.atlassian.net</span>' +
        '<input type="text" id="domain" value="' + escHtml(c.domain) + '" onchange="window._wizBoardField(\'domain\', this.value)" />' +
      '</div>' +
      '<div class="form-group">' +
        '<label for="email">Email</label>' +
        '<input type="email" id="email" value="' + escHtml(c.email) + '" onchange="window._wizBoardField(\'email\', this.value)" />' +
      '</div>' +
      '<div class="form-group">' +
        '<label for="apiToken">API Token</label>' +
        '<input type="password" id="apiToken" value="' + escHtml(c.apiToken) + '" onchange="window._wizBoardField(\'apiToken\', this.value)" />' +
      '</div>' +
      '<div class="form-group">' +
        '<label for="projectKey">Project Key</label>' +
        '<span class="hint">e.g. PROJ</span>' +
        '<input type="text" id="projectKey" value="' + escHtml(c.projectKey) + '" onchange="window._wizBoardField(\'projectKey\', this.value)" />' +
      '</div>' +
      '<div style="display:flex;gap:12px">' +
        '<button class="btn btn-secondary" onclick="window._wizTestConn()">Test Connection</button>' +
        '<button class="btn btn-secondary" onclick="window._wizDiscover()"' +
          (state.connectionTested ? '' : ' disabled') + '>Discover Board</button>' +
      '</div>' +
      '<div id="connMsg" class="msg"></div>';

    if (state.boardDiscovered && state.discoveredStatuses.length > 0) {
      html += '<div style="margin-top:16px;padding:12px;background:var(--bg);border:1px solid var(--border);border-radius:6px">' +

  function findStatusIdByRole(role) {
    var roleToNames = {
      "TODO": ["to do", "todo", "open"],
      "REFINED": ["refined", "ready for dev", "ready"],
      "AGENT": ["agent", "selected for development"],
      "QA": ["qa", "in review", "review", "code review"],
      "DONE": ["done", "closed", "resolved"]
    };
    var names = roleToNames[role] || [];
    for (var i = 0; i < state.discoveredStatuses.length; i++) {
      var s = state.discoveredStatuses[i];
      if (names.indexOf(s.name.toLowerCase()) !== -1) return s.id;

  function statusDropdown(selectedId, onchangeAttr) {
    var html = '<select onchange="' + onchangeAttr + '" style="font-size:13px">' +

      html += '<option value="' + escHtml(s.id) + '"' + sel + '>' + escHtml(s.name) + '</option>';
    }
    if (selectedId && !state.discoveredStatuses.some(function(s) { return s.id === selectedId; })) {
      html += '<option value="' + escHtml(selectedId) + '" selected>' + escHtml(selectedId) + ' (unknown)</option>';
    }

    return html;
  }

  function renderPipeline() {
    // Build the pipeline from the recipe routing, including human gates
    var recipes = state.config.recipes;
    var routing = state.config.routing;

    // Define the main pipeline flow with human gates
    // Order: refine output -> human gate -> code input -> code output -> review -> human gate -> done
    var steps = []; // { type: "status"|"human", id, label, recipe }

    // Build edges from active recipes
    var edges = [];
    var recipeOrder = ["refine", "architect", "code", "review"];
    for (var i = 0; i < recipeOrder.length; i++) {
      var rid = recipeOrder[i];
      if (recipes.indexOf(rid) === -1) continue;
      var route = routing[rid];
      if (route.fromId) {
        edges.push({ from: route.fromId, to: route.toId, recipe: rid });
      }
    }

    if (edges.length === 0) {
      return '<div class="pipeline"><span style="color:var(--text-muted);font-size:13px">Configure runners below to see the pipeline</span></div>';
    }

    // Build ordered node list with human gates inserted
    var seen = {};
    for (var ei = 0; ei < edges.length; ei++) {
      var edge = edges[ei];

      if (!seen[edge.from]) {
        seen[edge.from] = true;
        steps.push({ type: "status", id: edge.from });
      }

      steps.push({ type: "arrow", recipe: edge.recipe });

      var toId = edge.to || edge.from; // review stays in same lane
      if (!seen[toId]) {
        seen[toId] = true;
        steps.push({ type: "status", id: toId });
      }

      // Check if there's a gap between this edge's output and the next edge's input (human gate)
      if (ei < edges.length - 1) {
        var nextFrom = edges[ei + 1].from;
        if (toId !== nextFrom && !seen[nextFrom]) {
          steps.push({ type: "arrow", recipe: "human" });
          seen[nextFrom] = true;
          steps.push({ type: "status", id: nextFrom });
        }
      }
    }

    // Add final human gate to Done if we have a "Done" status discovered
    var doneId = findStatusIdByRole("DONE");
    if (doneId && !seen[doneId]) {
      steps.push({ type: "arrow", recipe: "human" });
      steps.push({ type: "status", id: doneId });
    }

    var html = '<div class="pipeline">';
    for (var si = 0; si < steps.length; si++) {
      var step = steps[si];
      if (step.type === "status") {
        html += '<div class="pipeline-node active">' + escHtml(statusName(step.id)) + '</div>';
      } else if (step.type === "arrow") {
        var isHuman = step.recipe === "human";
        var labelCls = isHuman ? "arrow-label human" : "arrow-label";
        var label = isHuman ? "you" : step.recipe;
        html += '<div class="pipeline-arrow">' +
          '<span class="' + labelCls + '">' + escHtml(label) + '</span>' +
          '<div class="arrow-line"></div>' +
        '</div>';
      }
    }
    html += '</div>';
    return html;
  }

  function applySuggestedSetup(mode) {
    var todoId = findStatusIdByRole("TODO");
    var refinedId = findStatusIdByRole("REFINED");
    var agentId = findStatusIdByRole("AGENT");
    var qaId = findStatusIdByRole("QA");
    var doneId = findStatusIdByRole("DONE");

    if (!todoId || !refinedId || !agentId || !qaId) {
      showMsg("configMsg", "error", "Could not auto-match all lanes. Your board may use different status names. Configure manually below.");
      return;
    }

    if (mode === "human-gates") {
      // Human gates: Refined->Agent is manual, QA->Done is manual
      state.config.routing.refine = { fromId: todoId, toId: refinedId, maxCards: 5 };
      state.config.routing.code = { fromId: agentId, toId: qaId, maxCards: 2 };
      state.config.routing.review = { fromId: qaId, toId: "", maxCards: 10 };
      state.config.routing.triage = { fromId: todoId, toId: refinedId, maxCards: 5 };
      state.config.routing.bounce = { fromId: qaId, toId: agentId, maxCards: 10 };
      renderCard();
      showMsg("configMsg", "success", "Human gates setup applied. You review specs before implementation and PRs before merge.");
    } else {
      // Fully autonomous: everything automated end-to-end
      state.config.routing.refine = { fromId: todoId, toId: agentId, maxCards: 5 };
      state.config.routing.code = { fromId: agentId, toId: qaId, maxCards: 2 };
      state.config.routing.review = { fromId: qaId, toId: doneId || "", maxCards: 10 };
      state.config.routing.triage = { fromId: todoId, toId: agentId, maxCards: 5 };
      state.config.routing.bounce = { fromId: qaId, toId: agentId, maxCards: 10 };
      renderCard();
      showMsg("configMsg", "info", "Fully autonomous setup applied. Note: auto-merge is not yet implemented -- PR merge to Done still requires a human step.");
    }
  }

  window._wizSave = async function() {
    hideMsg("saveMsg");
    showMsg("saveMsg", "info", "Saving configuration...");
    try {
      var c = state.config;
      var env = {
        BOARD_ADAPTER: c.adapter,
        BOARD_DOMAIN: c.domain,
        BOARD_API_TOKEN: c.apiToken,
        BOARD_PROJECT_KEY: c.projectKey,
        BOARD_EMAIL: c.email,
        GIT_BASE_BRANCH: c.baseBranch,
        POLL_INTERVAL: String((c.pollInterval || 60) * 60),
        RUNNERS_ENABLED: (c.recipes || []).join(",")
      };

      // Add per-recipe routing and max cards
      var recipeIds = ["refine", "architect", "code", "review", "triage", "bounce"];
      for (var i = 0; i < recipeIds.length; i++) {
        var rid = recipeIds[i];
        var upper = rid.toUpperCase();
        var route = c.routing[rid];
        env["RUNNER_" + upper + "_FROM"] = route.fromId || "";
        env["RUNNER_" + upper + "_TO"] = route.toId || "";
        env["MAX_CARDS_" + upper] = String(route.maxCards || 5);
      }

      // Build adapter config
      var adapterConfig = {};
      for (var s = 0; s < state.discoveredStatuses.length; s++) {
        var status = state.discoveredStatuses[s];
        adapterConfig["STATUS_" + status.id] = status.name;
      }
      for (var t = 0; t < state.discoveredTransitions.length; t++) {
        var trans = state.discoveredTransitions[t];
        if (trans.toId && trans.id) {
          adapterConfig["TRANSITION_TO_" + trans.toId] = trans.id;
        }
      }

      var result = await apiPost("/api/save-config", {
        adapter: c.adapter,
        env: env,
        adapterConfig: adapterConfig
      });
      if (!result.success) {
        showMsg("saveMsg", "error", result.message || "Failed to save.");
        return;
      }
      showMsg("saveMsg", "success", "Configuration saved successfully.");
      setTimeout(goNext, 1000);
    } catch(e) {
      showMsg("saveMsg", "error", "Failed to save: " + e.message);
    }
  };

        '{\n  "permissions": {\n    "allow": [\n      "Bash(*)", "Read(*)", "Write(*)",\n      "Edit(*)", "Glob(*)", "Grep(*)"\n    ]\n  }\n}' +
      '</div>' +
      '<p style="font-size:12px;color:var(--text-muted)">Save this as <code style="background:var(--bg);padding:2px 6px;border-radius:3px">.claude/settings.local.json</code> in your project root. This file is gitignored — each developer needs their own copy.</p>' +
      '</div>';

    // Run without wizard
    html += '<div style="margin-top:24px">' +
      '<h3 style="font-size:15px;font-weight:600;color:var(--accent);margin-bottom:12px">Run Without the Wizard</h3>' +
      '<p style="font-size:13px;color:var(--text-muted);margin-bottom:12px">' +
        'Start the runner directly without the setup wizard:</p>' +
      '<div style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:12px;font-family:monospace;font-size:13px;margin-bottom:16px">' +
        '<div><strong>Windows:</strong> run.bat</div>' +
        '<div><strong>macOS / Linux:</strong> bash run.sh</div>' +
      '</div>' +
      '</div>';

    // Scheduling instructions
    html += '<div style="margin-top:16px">' +
      '<h3 style="font-size:15px;font-weight:600;color:var(--accent);margin-bottom:12px">Schedule Automatic Runs</h3>' +
      '<details style="margin-bottom:12px">' +
        '<summary style="cursor:pointer;font-weight:600;font-size:14px;color:var(--text)">Windows (Task Scheduler)</summary>' +
        '<div style="padding:12px;font-size:13px;color:var(--text-muted)">' +
          '<ol style="padding-left:20px;line-height:2">' +
            '<li>Open Task Scheduler (<code style="background:var(--bg);padding:2px 6px;border-radius:3px">taskschd.msc</code>)</li>' +
            '<li>Click "Create Basic Task"</li>' +
            '<li>Set trigger: "When the computer starts" or a schedule</li>' +
            '<li>Set action: Start a program</li>' +
            '<li>Program: <code style="background:var(--bg);padding:2px 6px;border-radius:3px">cmd</code></li>' +
            '<li>Arguments: <code style="background:var(--bg);padding:2px 6px;border-radius:3px">/c "cd /d YOUR_PROJECT_PATH &amp;&amp; run.bat"</code></li>' +
          '</ol>' +
        '</div>' +
      '</details>' +
      '<details style="margin-bottom:12px">' +
        '<summary style="cursor:pointer;font-weight:600;font-size:14px;color:var(--text)">macOS (launchd)</summary>' +
        '<div style="padding:12px;font-size:13px;color:var(--text-muted)">' +
          '<p>Create <code style="background:var(--bg);padding:2px 6px;border-radius:3px">~/Library/LaunchAgents/fit.sorta.runner.plist</code></p>' +
          '<p style="margin-top:8px">Set <code>ProgramArguments</code> to <code>["bash", "YOUR_PROJECT_PATH/run.sh"]</code> with <code>RunAtLoad</code> = true.</p>' +
          '<p style="margin-top:8px">Load it: <code style="background:var(--bg);padding:2px 6px;border-radius:3px">launchctl load ~/Library/LaunchAgents/fit.sorta.runner.plist</code></p>' +
        '</div>' +
      '</details>' +
      '<details style="margin-bottom:12px">' +
        '<summary style="cursor:pointer;font-weight:600;font-size:14px;color:var(--text)">Linux (cron)</summary>' +
        '<div style="padding:12px;font-size:13px;color:var(--text-muted)">' +
          '<p>Run <code style="background:var(--bg);padding:2px 6px;border-radius:3px">crontab -e</code> and add:</p>' +
          '<pre style="background:var(--bg);padding:8px;border-radius:4px;margin:8px 0;border:1px solid var(--border)">@reboot cd YOUR_PROJECT_PATH &amp;&amp; bash run.sh</pre>' +
        '</div>' +
      '</details>' +
      '</div>';

    html += '<div class="btn-row">' +
      backBtn() +
      '<span></span>' +
      '</div>';
    return html;
  }

  window._wizStartRunner = async function(background) {
    hideMsg("runnerMsg");
    showMsg("runnerMsg", "info", "Starting runner...");
    try {
      var data = await apiPost("/api/start-runner", { background: !!background });
      state.runner.running = true;
      state.runner.pid = data.pid || null;
      renderCard();
      showMsg("runnerMsg", "success", "Runner started successfully.");
      startStatusPolling();
    } catch(e) {
      showMsg("runnerMsg", "error", "Failed to start runner: " + e.message);
    }
  };

  window._wizStopRunner = async function() {
    hideMsg("runnerMsg");
    showMsg("runnerMsg", "info", "Stopping runner...");
    try {
      await apiPost("/api/stop-runner");
      state.runner.running = false;
      state.runner.pid = null;
      stopStatusPolling();
      renderCard();
      showMsg("runnerMsg", "success", "Runner stopped.");
    } catch(e) {
      showMsg("runnerMsg", "error", "Failed to stop runner: " + e.message);
    }
  };

  window._wizCheckStatus = async function() {
    try {
      var data = await apiPost("/api/runner-status");
      state.runner.running = !!data.running;
      state.runner.pid = data.pid || null;
      renderCard();
    } catch(e) {
      showMsg("runnerMsg", "error", "Failed to fetch status: " + e.message);
    }
  };

  function startStatusPolling() {
    stopStatusPolling();
    state.runner.pollTimer = setInterval(async function() {
      try {
        var data = await apiPost("/api/runner-status");
        state.runner.running = !!data.running;
        state.runner.pid = data.pid || null;
        if (state.currentStep === 7) {
          renderCard();
        }
        if (!state.runner.running) {
          stopStatusPolling();
        }
      } catch(e) { /* silent */ }
    }, 5000);
  }

  function stopStatusPolling() {
    if (state.runner.pollTimer) {
      clearInterval(state.runner.pollTimer);
      state.runner.pollTimer = null;
    }
  }

  // ---- Render ----

  var stepRenderers = [
    renderWelcome,
    renderDeps,
    renderBoard,
    renderSelectRecipes,
    renderConfigureRecipes,
    renderGit,
    renderReview,
    renderRunning
  ];

  function renderCard() {
    document.getElementById("wizardCard").innerHTML = stepRenderers[state.currentStep]();
  }

  function render() {
    renderStepIndicator();
    renderCard();

    if (state.currentStep === 1 && !state.deps) {
      window._wizCheckDeps();
    }

    if (state.currentStep === 7 && state.runner.running) {
      startStatusPolling();
    } else if (state.currentStep !== 7) {
      stopStatusPolling();
    }

    if (state.currentStep === 7) {
      window._wizCheckStatus();
    }
  }

  // ---- Init ----

  if (window.location.protocol === "file:") {
    document.getElementById("wizardCard").innerHTML =
      '<h2>Server Not Running</h2>' +
      '<p>This page was opened directly from the file system. The setup wizard needs its server running.</p>' +
      '<p style="margin-top:16px"><strong>To start the server:</strong></p>' +
      '<p><strong>Windows:</strong> Double-click <code style="background:var(--bg);padding:2px 6px;border-radius:3px">setup.bat</code></p>' +
      '<p><strong>macOS / Linux:</strong> Run <code style="background:var(--bg);padding:2px 6px;border-radius:3px">bash setup.sh</code></p>' +
      '<p style="margin-top:16px;color:var(--text-muted)">The server will open this wizard automatically at <code style="background:var(--bg);padding:2px 6px;border-radius:3px">http://localhost:3456</code></p>';
    return;
  }

  // Load existing config before rendering
  (async function() {
    try {
      var data = await apiPost("/api/load-config");
      if (data.success && data.env) {
        var env = data.env;
        state.config.adapter = env.BOARD_ADAPTER || "jira";
        state.config.domain = env.BOARD_DOMAIN || "";
        state.config.email = env.BOARD_EMAIL || "";
        state.config.apiToken = env.BOARD_API_TOKEN || "";
        state.config.projectKey = env.BOARD_PROJECT_KEY || "";
        state.config.baseBranch = env.GIT_BASE_BRANCH || "main";
        state.config.pollInterval = env.POLL_INTERVAL ? Math.round(parseInt(env.POLL_INTERVAL) / 60) : 60;

        if (env.RUNNERS_ENABLED) {
          state.config.recipes = env.RUNNERS_ENABLED.split(",").map(function(s) { return s.trim(); });
        }

        var recipeIds = ["refine", "architect", "code", "review", "triage", "bounce"];
        for (var i = 0; i < recipeIds.length; i++) {
          var rid = recipeIds[i];
          var upper = rid.toUpperCase();
          var fromKey = "RUNNER_" + upper + "_FROM";
          var toKey = "RUNNER_" + upper + "_TO";
          var maxKey = "MAX_CARDS_" + upper;
          if (env[fromKey]) state.config.routing[rid].fromId = env[fromKey];
          if (env[toKey]) state.config.routing[rid].toId = env[toKey];
          if (env[maxKey]) state.config.routing[rid].maxCards = parseInt(env[maxKey]) || state.config.routing[rid].maxCards;
        }

        if (data.statuses && data.statuses.length > 0) {
          state.discoveredStatuses = data.statuses;
          state.boardDiscovered = true;
          state.connectionTested = true;
        }
        if (data.transitions && data.transitions.length > 0) {
          state.discoveredTransitions = data.transitions.map(function(t) {
            return { id: t.transitionId, name: "", toName: "", toId: t.statusId };
          });
        }
      }
    } catch(e) {
      // No existing config -- proceed with defaults
    }

    // Allow jumping to a step via URL parameter: ?step=7
    var params = new URLSearchParams(window.location.search);
    var stepParam = parseInt(params.get("step"));
    if (stepParam >= 0 && stepParam < STEPS.length) {
      state.currentStep = stepParam;
    }

    render();
  })();

})();
</script>
</body>
</html>
