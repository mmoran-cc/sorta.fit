<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorta - Setup Wizard</title>
<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg: #0d1117;
  --card: #161b22;
  --border: #30363d;
  --text: #e6edf3;
  --text-muted: #8b949e;
  --accent: #58a6ff;
  --accent-hover: #79b8ff;
  --success: #3fb950;
  --error: #f85149;
  --warning: #d29922;
  --input-bg: #0d1117;
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  padding: 24px 16px;
}

.container {
  max-width: 720px;
  margin: 0 auto;
}

/* Step indicator */
.step-indicator {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  margin-bottom: 32px;
  flex-wrap: wrap;
}

.step-dot-group {
  display: flex;
  align-items: center;
}

.step-dot {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-muted);
  background: var(--card);
  transition: all 0.3s ease;
  flex-shrink: 0;
}

.step-dot.active {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(88, 166, 255, 0.1);
}

.step-dot.completed {
  border-color: var(--success);
  background: var(--success);
  color: #fff;
}

.step-line {
  width: 24px;
  height: 2px;
  background: var(--border);
  transition: background 0.3s ease;
  flex-shrink: 0;
}

.step-line.completed {
  background: var(--success);
}

/* Card */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 32px;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.card h2 {
  font-size: 22px;
  font-weight: 600;
  margin-bottom: 8px;
}

.card p {
  color: var(--text-muted);
  margin-bottom: 16px;
}

.card p.description {
  margin-bottom: 24px;
  line-height: 1.7;
}

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 10px 24px;
  border: none;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 600;
  font-family: var(--font);
  cursor: pointer;
  transition: all 0.2s ease;
  text-decoration: none;
  gap: 8px;
}

.btn-primary {
  background: var(--accent);
  color: #fff;
}

.btn-primary:hover:not(:disabled) {
  background: var(--accent-hover);
}

.btn-secondary {
  background: var(--border);
  color: var(--text);
}

.btn-secondary:hover:not(:disabled) {
  background: #484f58;
}

.btn-success {
  background: var(--success);
  color: #fff;
}

.btn-success:hover:not(:disabled) {
  background: #46c258;
}

.btn-danger {
  background: var(--error);
  color: #fff;
}

.btn-danger:hover:not(:disabled) {
  background: #fa6a63;
}

.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.btn-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 24px;
  gap: 12px;
}

.btn-row-right {
  display: flex;
  gap: 12px;
  margin-left: auto;
}

/* Forms */
.form-group {
  margin-bottom: 20px;
}

.form-group label {
  display: block;
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 6px;
  color: var(--text);
}

.form-group .hint {
  display: block;
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 6px;
}

input[type="text"],
input[type="password"],
input[type="email"],
input[type="number"],
select {
  width: 100%;
  padding: 10px 12px;
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 14px;
  font-family: var(--font);
  transition: border-color 0.2s ease;
}

input:focus, select:focus {
  outline: none;
  border-color: var(--accent);
}

select option {
  background: var(--card);
  color: var(--text);
}

select option:disabled {
  color: var(--text-muted);
}

/* Checklist */
.checklist {
  list-style: none;
  margin: 16px 0;
}

.checklist li {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  border: 1px solid var(--border);
  border-radius: 6px;
  margin-bottom: 8px;
  background: var(--bg);
}

.checklist li .status-icon {
  width: 20px;
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-weight: 700;
  font-size: 14px;
}

.checklist li .dep-name {
  font-weight: 600;
  min-width: 90px;
}

.checklist li .dep-version {
  color: var(--text-muted);
  font-size: 13px;
  margin-left: auto;
}

.status-pending { color: var(--warning); }
.status-ok { color: var(--success); }
.status-fail { color: var(--error); }

/* Status dot */
.dot {
  display: inline-block;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  margin-right: 8px;
  flex-shrink: 0;
}

.dot-green { background: var(--success); }
.dot-red { background: var(--error); }
.dot-yellow { background: var(--warning); }

/* Inline messages */
.msg {
  padding: 10px 14px;
  border-radius: 6px;
  font-size: 13px;
  margin-top: 12px;
  display: none;
}

.msg.visible {
  display: block;
}

.msg-success {
  background: rgba(63, 185, 80, 0.1);
  border: 1px solid rgba(63, 185, 80, 0.3);
  color: var(--success);
}

.msg-error {
  background: rgba(248, 81, 73, 0.1);
  border: 1px solid rgba(248, 81, 73, 0.3);
  color: var(--error);
}

.msg-info {
  background: rgba(88, 166, 255, 0.1);
  border: 1px solid rgba(88, 166, 255, 0.3);
  color: var(--accent);
}

/* Summary table */
.summary-section {
  margin-bottom: 20px;
}

.summary-section h3 {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 8px;
  color: var(--accent);
}

.summary-table {
  width: 100%;
  border-collapse: collapse;
}

.summary-table td {
  padding: 6px 0;
  font-size: 13px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}

.summary-table td:first-child {
  color: var(--text-muted);
  width: 180px;
  padding-right: 16px;
}

/* Lanes table */
.lanes-table {
  width: 100%;
  border-collapse: collapse;
  margin: 16px 0;
}

.lanes-table th {
  text-align: left;
  padding: 8px 10px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-muted);
  border-bottom: 2px solid var(--border);
}

.lanes-table td {
  padding: 8px 10px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}

.lanes-table input {
  width: 100%;
  padding: 6px 8px;
  font-size: 13px;
}

/* Checkboxes */
.checkbox-group {
  margin: 16px 0;
}

.checkbox-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 16px;
  border: 1px solid var(--border);
  border-radius: 6px;
  margin-bottom: 8px;
  background: var(--bg);
  cursor: pointer;
  transition: border-color 0.2s ease;
}

.checkbox-item:hover {
  border-color: var(--accent);
}

.checkbox-item input[type="checkbox"] {
  margin-top: 3px;
  accent-color: var(--accent);
  width: 16px;
  height: 16px;
  flex-shrink: 0;
}

.checkbox-item .recipe-info {
  flex: 1;
}

.checkbox-item .recipe-name {
  font-weight: 600;
  font-size: 14px;
  display: block;
}

.checkbox-item .recipe-desc {
  font-size: 12px;
  color: var(--text-muted);
  display: block;
  margin-top: 2px;
}

/* Dashboard */
.dashboard-status {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 20px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg);
  margin: 16px 0;
}

.dashboard-status .status-text {
  font-weight: 600;
  font-size: 16px;
}

.dashboard-detail {
  color: var(--text-muted);
  font-size: 13px;
  margin-top: 4px;
}

.dashboard-controls {
  display: flex;
  gap: 12px;
  margin: 16px 0;
}

/* Spinner */
.spinner {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* Header */
.header {
  text-align: center;
  margin-bottom: 32px;
}

.header h1 {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.5px;
}

.header .tagline {
  color: var(--text-muted);
  font-size: 14px;
  margin-top: 4px;
}

/* Responsive */
@media (max-width: 480px) {
  .card {
    padding: 20px;
  }
  .step-dot {
    width: 26px;
    height: 26px;
    font-size: 11px;
  }
  .step-line {
    width: 12px;
  }
  .btn-row {
    flex-direction: column;
  }
  .btn-row-right {
    margin-left: 0;
    width: 100%;
  }
  .btn-row-right .btn {
    flex: 1;
  }
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Sorta.Fit</h1>
    <div class="tagline">AI-powered sprint automation</div>
  </div>
  <div class="step-indicator" id="stepIndicator"></div>
  <div class="card" id="wizardCard"></div>
</div>

<script>
(function() {
  "use strict";

  var STEPS = [
    { label: "Welcome" },
    { label: "Dependencies" },
    { label: "Board" },
    { label: "Lanes" },
    { label: "Git" },
    { label: "Recipes" },
    { label: "Review" },
    { label: "Running" }
  ];

  var state = {
    currentStep: 0,
    deps: null,
    connectionTested: false,
    boardDiscovered: false,
    discoveredStatuses: [],
    discoveredTransitions: [],
    config: {
      adapter: "jira",
      domain: "",
      email: "",
      apiToken: "",
      projectKey: "",
      lanes: {},
      baseBranch: "main",
      pollInterval: 60,
      maxRefineCards: 5,
      maxCodeCards: 2,
      recipes: ["refine", "code"],
      routing: {
        refine: { from: "To Do", to: "REFINED" },
        code:   { from: "Agent", to: "QA" },
        review: { from: "QA", to: "" },
        triage: { from: "To Do", to: "REFINED" },
        bounce: { from: "QA", to: "AGENT" }
      }
    },
    runner: {
      running: false,
      pid: null,
      pollTimer: null
    }
  };

  // ---- Utilities ----

  function $(sel, parent) {
    return (parent || document).querySelector(sel);
  }

  function escHtml(str) {
    var d = document.createElement("div");
    d.textContent = str;
    return d.innerHTML;
  }

  function showMsg(id, type, text) {
    var el = document.getElementById(id);
    if (!el) return;
    el.className = "msg visible msg-" + type;
    el.textContent = text;
  }

  function hideMsg(id) {
    var el = document.getElementById(id);
    if (!el) return;
    el.className = "msg";
    el.textContent = "";
  }

  async function apiPost(url, data) {
    var resp = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data || {})
    });
    if (!resp.ok) {
      var errText = "";
      try { errText = (await resp.json()).error || resp.statusText; }
      catch(e) { errText = resp.statusText; }
      throw new Error(errText);
    }
    return resp.json();
  }

  // ---- Step indicator ----

  function renderStepIndicator() {
    var html = "";
    for (var i = 0; i < STEPS.length; i++) {
      var cls = "step-dot";
      if (i < state.currentStep) cls += " completed";
      else if (i === state.currentStep) cls += " active";
      var inner = (i < state.currentStep) ? "&#10003;" : String(i + 1);
      html += '<div class="step-dot-group">';
      html += '<div class="' + cls + '" title="' + escHtml(STEPS[i].label) + '">' + inner + '</div>';
      if (i < STEPS.length - 1) {
        var lineCls = "step-line" + (i < state.currentStep ? " completed" : "");
        html += '<div class="' + lineCls + '"></div>';
      }
      html += '</div>';
    }
    document.getElementById("stepIndicator").innerHTML = html;
  }

  // ---- Navigation ----

  function goNext() {
    if (state.currentStep < STEPS.length - 1) {
      state.currentStep++;
      render();
    }
  }

  function goBack() {
    if (state.currentStep > 0) {
      state.currentStep--;
      render();
    }
  }

  function backBtn() {
    return '<button class="btn btn-secondary" onclick="window._wizBack()">Back</button>';
  }

  window._wizBack = goBack;

  // ---- Step 0: Welcome ----

  function renderWelcome() {
    return '' +
      '<h2>Welcome to Sorta.Fit</h2>' +
      '<p class="description">' +
        'Sorta.Fit connects your issue board to Claude Code to handle the repetitive parts of your sprint. ' +
        'It watches your board and runs recipes -- refining cards into specs, implementing features in isolated branches, ' +
        'opening pull requests, and reviewing diffs -- so you can focus on the decisions that matter.' +
      '</p>' +
      '<p class="description" style="margin-bottom:0">' +
        'You stay in control. Sorta.Fit handles the legwork, you handle the judgment calls: what gets built, what gets merged, and when.' +
      '</p>' +
      '<div class="btn-row">' +
        '<div class="btn-row-right">' +
          '<button class="btn btn-primary" onclick="window._wizNext0()">Get Started</button>' +
        '</div>' +
      '</div>';
  }

  window._wizNext0 = goNext;

  // ---- Step 1: Check Dependencies ----

  function renderDeps() {
    var items = ["git", "node", "claude", "gh"];
    var labels = { git: "Git", node: "Node.js", claude: "Claude CLI", gh: "GitHub CLI" };
    var html = '<h2>Check Dependencies</h2>' +
      '<p>Verifying that all required tools are installed on this system.</p>' +
      '<ul class="checklist" id="depList">';
    for (var i = 0; i < items.length; i++) {
      var key = items[i];
      var icon, iconCls, version;
      if (!state.deps) {
        icon = "...";
        iconCls = "status-pending";
        version = "checking";
      } else {
        var d = state.deps[key];
        if (d && d.found) {
          icon = "&#10003;";
          iconCls = "status-ok";
          version = d.version || "found";
        } else {
          icon = "&#10007;";
          iconCls = "status-fail";
          version = "not found";
        }
      }
      html += '<li>' +
        '<span class="status-icon ' + iconCls + '">' + icon + '</span>' +
        '<span class="dep-name">' + escHtml(labels[key]) + '</span>' +
        '<span class="dep-version">' + escHtml(version) + '</span>' +
        '</li>';
    }
    html += '</ul>';
    html += '<div id="depMsg" class="msg"></div>';

    var allOk = state.deps && state.deps.git && state.deps.git.found &&
                state.deps.node && state.deps.node.found &&
                state.deps.claude && state.deps.claude.found &&
                state.deps.gh && state.deps.gh.found;

    html += '<div class="btn-row">' +
      backBtn() +
      '<div class="btn-row-right">' +
        '<button class="btn btn-secondary" onclick="window._wizCheckDeps()">Re-check</button>' +
        '<button class="btn btn-primary" ' + (allOk ? '' : 'disabled') + ' onclick="window._wizNext1()">Next</button>' +
      '</div>' +
      '</div>';
    return html;
  }

  window._wizCheckDeps = async function() {
    state.deps = null;
    renderCard();
    try {
      var data = await apiPost("/api/check-dependencies");
      var depMap = {};
      if (data.dependencies) {
        for (var j = 0; j < data.dependencies.length; j++) {
          depMap[data.dependencies[j].name] = data.dependencies[j];
        }
      }
      state.deps = depMap;
      renderCard();
    } catch(e) {
      state.deps = {};
      renderCard();
      var hint = e.message === "Failed to fetch" ? " -- is the setup server running? Use setup.bat or setup.sh to start it." : "";
      showMsg("depMsg", "error", "Failed to check dependencies: " + e.message + hint);
    }
  };

  window._wizNext1 = goNext;

  // ---- Step 2: Connect Board ----

  function renderBoard() {
    var c = state.config;
    var html = '<h2>Connect Board</h2>' +
      '<p>Configure the connection to your issue tracking board.</p>' +
      '<div class="form-group">' +
        '<label for="adapter">Adapter</label>' +
        '<select id="adapter" onchange="window._wizBoardField(\'adapter\', this.value)">' +
          '<option value="jira"' + (c.adapter === "jira" ? " selected" : "") + '>Jira</option>' +
          '<option value="linear" disabled>Linear (coming soon)</option>' +
          '<option value="github-issues" disabled>GitHub Issues (coming soon)</option>' +
        '</select>' +
      '</div>' +
      '<div class="form-group">' +
        '<label for="domain">Board Domain</label>' +
        '<span class="hint">e.g. yourteam.atlassian.net</span>' +
        '<input type="text" id="domain" value="' + escHtml(c.domain) + '" onchange="window._wizBoardField(\'domain\', this.value)" />' +
      '</div>' +
      '<div class="form-group">' +
        '<label for="email">Email</label>' +
        '<input type="email" id="email" value="' + escHtml(c.email) + '" onchange="window._wizBoardField(\'email\', this.value)" />' +
      '</div>' +
      '<div class="form-group">' +
        '<label for="apiToken">API Token</label>' +
        '<input type="password" id="apiToken" value="' + escHtml(c.apiToken) + '" onchange="window._wizBoardField(\'apiToken\', this.value)" />' +
      '</div>' +
      '<div class="form-group">' +
        '<label for="projectKey">Project Key</label>' +
        '<span class="hint">e.g. PROJ</span>' +
        '<input type="text" id="projectKey" value="' + escHtml(c.projectKey) + '" onchange="window._wizBoardField(\'projectKey\', this.value)" />' +
      '</div>' +
      '<button class="btn btn-secondary" onclick="window._wizTestConn()">Test Connection</button>' +
      '<div id="connMsg" class="msg"></div>' +
      '<div class="btn-row">' +
        backBtn() +
        '<div class="btn-row-right">' +
          '<button class="btn btn-primary" ' + (state.connectionTested ? '' : 'disabled') + ' onclick="window._wizNext2()">Next</button>' +
        '</div>' +
      '</div>';
    return html;
  }

  window._wizBoardField = function(field, val) {
    state.config[field] = val;
    state.connectionTested = false;
    var nextBtn = document.querySelector(".btn-primary:last-of-type");
  };

  window._wizTestConn = async function() {
    var c = state.config;
    hideMsg("connMsg");
    if (!c.domain || !c.email || !c.apiToken || !c.projectKey) {
      showMsg("connMsg", "error", "Please fill in all fields before testing the connection.");
      return;
    }
    showMsg("connMsg", "info", "Testing connection...");
    try {
      var result = await apiPost("/api/test-connection", {
        adapter: c.adapter,
        domain: c.domain,
        email: c.email,
        token: c.apiToken,
        projectKey: c.projectKey
      });
      if (!result.success) {
        state.connectionTested = false;
        showMsg("connMsg", "error", result.message || "Connection failed.");
        return;
      }
      state.connectionTested = true;
      renderCard();
      showMsg("connMsg", "success", result.message || "Connection successful.");
    } catch(e) {
      state.connectionTested = false;
      showMsg("connMsg", "error", "Connection failed: " + e.message);
    }
  };

  window._wizNext2 = goNext;

  // ---- Step 3: Configure Lanes ----

  var LANE_DEFS = [
    { key: "TODO", label: "To Do", hint: "Cards waiting to be worked on" },
    { key: "REFINED", label: "Refined", hint: "Cards with specs ready for implementation" },
    { key: "AGENT", label: "Agent", hint: "Cards assigned to the AI coder" },
    { key: "IN_PROGRESS", label: "In Progress", hint: "Cards actively being worked" },
    { key: "QA", label: "QA", hint: "Cards with PRs ready for review" },
    { key: "DONE", label: "Done", hint: "Completed cards" },
    { key: "BACKLOG", label: "Backlog", hint: "Low-priority or future cards" }
  ];

  function renderLanes() {
    var lanes = state.config.lanes;

    var html = '<h2>Configure Lanes</h2>' +
      '<p>Map your board statuses and transitions to Sorta.Fit lanes. Click "Discover Board" to auto-detect available values.</p>' +
      '<button class="btn btn-secondary" onclick="window._wizDiscover()" style="margin-bottom:16px">Discover Board</button>' +
      '<div id="lanesMsg" class="msg"></div>';

    // Show discovered statuses/transitions as reference if available
    if (state.discoveredStatuses && state.discoveredStatuses.length > 0) {
      html += '<details style="margin-bottom:16px;font-size:13px;color:var(--text-muted)">' +
        '<summary style="cursor:pointer;color:var(--accent);margin-bottom:8px">Available statuses and transitions (reference)</summary>' +
        '<div style="display:flex;gap:24px;flex-wrap:wrap">' +
        '<div><strong style="color:var(--text)">Statuses</strong><br>';
      for (var s = 0; s < state.discoveredStatuses.length; s++) {
        html += escHtml(state.discoveredStatuses[s].id + ' - ' + state.discoveredStatuses[s].name) + '<br>';
      }
      html += '</div>';
      if (state.discoveredTransitions && state.discoveredTransitions.length > 0) {
        html += '<div><strong style="color:var(--text)">Transitions</strong><br>';
        for (var t = 0; t < state.discoveredTransitions.length; t++) {
          var tr = state.discoveredTransitions[t];
          html += escHtml(tr.id + ' - ' + tr.name + ' -> ' + tr.to) + '<br>';
        }
        html += '</div>';
      }
      html += '</div></details>';
    }

    html += '<table class="lanes-table">' +
      '<thead><tr>' +
        '<th>Lane</th>' +
        '<th>Status ID</th>' +
        '<th>Transition ID</th>' +
      '</tr></thead>' +
      '<tbody>';

    for (var i = 0; i < LANE_DEFS.length; i++) {
      var def = LANE_DEFS[i];
      var lane = lanes[def.key] || {};
      html += '<tr>' +
        '<td><span style="font-weight:600">' + escHtml(def.label) + '</span>' +
          '<br><span style="font-size:11px;color:var(--text-muted)">' + escHtml(def.hint) + '</span></td>' +
        '<td><input type="text" id="lane_status_' + def.key + '" value="' + escHtml(lane.statusId || "") +
          '" onchange="window._wizLaneField(\'' + def.key + '\', \'statusId\', this.value)" placeholder="e.g. 10000" /></td>' +
        '<td><input type="text" id="lane_trans_' + def.key + '" value="' + escHtml(lane.transitionId || "") +
          '" onchange="window._wizLaneField(\'' + def.key + '\', \'transitionId\', this.value)" placeholder="e.g. 11" /></td>' +
        '</tr>';
    }

    html += '</tbody></table>' +
      '<div class="btn-row">' +
        backBtn() +
        '<div class="btn-row-right">' +
          '<button class="btn btn-primary" onclick="window._wizNext3()">Next</button>' +
        '</div>' +
      '</div>';
    return html;
  }

  window._wizLaneField = function(lane, field, val) {
    if (!state.config.lanes[lane]) {
      state.config.lanes[lane] = {};
    }
    state.config.lanes[lane][field] = val;
  };

  window._wizDiscover = async function() {
    hideMsg("lanesMsg");
    showMsg("lanesMsg", "info", "Discovering board configuration...");
    try {
      var data = await apiPost("/api/discover-board", {
        adapter: state.config.adapter,
        domain: state.config.domain,
        email: state.config.email,
        token: state.config.apiToken,
        projectKey: state.config.projectKey
      });
      if (!data.success) {
        showMsg("lanesMsg", "error", data.message || "Discovery failed.");
        return;
      }
      state.discoveredStatuses = data.statuses || [];
      state.discoveredTransitions = data.transitions || [];

      // Auto-match discovered statuses to lanes by name
      var nameMap = {
        "to do": "TODO", "todo": "TODO", "open": "TODO",
        "refined": "REFINED", "ready for dev": "REFINED", "ready": "REFINED",
        "agent": "AGENT", "selected for development": "AGENT",
        "in progress": "IN_PROGRESS", "in development": "IN_PROGRESS",
        "qa": "QA", "in review": "QA", "review": "QA", "code review": "QA",
        "done": "DONE", "closed": "DONE", "resolved": "DONE",
        "backlog": "BACKLOG"
      };
      for (var s = 0; s < data.statuses.length; s++) {
        var status = data.statuses[s];
        var laneKey = nameMap[status.name.toLowerCase()];
        if (laneKey && !state.config.lanes[laneKey]) {
          state.config.lanes[laneKey] = { statusId: status.id, transitionId: "" };
        }
      }
      // Auto-match transitions by target status name
      for (var t = 0; t < (data.transitions || []).length; t++) {
        var trans = data.transitions[t];
        var transLane = nameMap[(trans.to || "").toLowerCase()];
        if (transLane && state.config.lanes[transLane] && !state.config.lanes[transLane].transitionId) {
          state.config.lanes[transLane].transitionId = trans.id;
        }
      }
      state.boardDiscovered = true;
      renderCard();
      showMsg("lanesMsg", "success", "Board discovered and auto-matched. Review the values below and adjust as needed.");
    } catch(e) {
      showMsg("lanesMsg", "error", "Discovery failed: " + e.message);
    }
  };

  window._wizNext3 = function() {
    // Only TODO, QA, REFINED are strictly required for basic operation
    var lanes = state.config.lanes;
    var required = ["TODO", "REFINED", "QA"];
    var missing = [];
    for (var i = 0; i < required.length; i++) {
      if (!lanes[required[i]] || !lanes[required[i]].statusId) {
        missing.push(required[i]);
      }
    }
    if (missing.length > 0) {
      showMsg("lanesMsg", "error", "Please provide a status ID for at least: " + missing.join(", "));
      return;
    }
    goNext();
  };

  // ---- Step 4: Git Settings ----

  function renderGit() {
    var c = state.config;
    var html = '<h2>Git Settings</h2>' +
      '<p>Configure version control and automation parameters.</p>' +
      '<div class="form-group">' +
        '<label for="baseBranch">Base Branch</label>' +
        '<input type="text" id="baseBranch" value="' + escHtml(c.baseBranch) + '" onchange="window._wizGitField(\'baseBranch\', this.value)" />' +
      '</div>' +
      '<div class="form-group">' +
        '<label for="pollInterval">Poll Interval (minutes)</label>' +
        '<input type="number" id="pollInterval" value="' + c.pollInterval + '" min="1" onchange="window._wizGitField(\'pollInterval\', parseInt(this.value) || 60)" />' +
      '</div>' +
      '<div class="form-group">' +
        '<label for="maxRefineCards">Max Cards per Refine Cycle</label>' +
        '<input type="number" id="maxRefineCards" value="' + c.maxRefineCards + '" min="1" onchange="window._wizGitField(\'maxRefineCards\', parseInt(this.value) || 5)" />' +
      '</div>' +
      '<div class="form-group">' +
        '<label for="maxCodeCards">Max Cards per Code Cycle</label>' +
        '<input type="number" id="maxCodeCards" value="' + c.maxCodeCards + '" min="1" onchange="window._wizGitField(\'maxCodeCards\', parseInt(this.value) || 2)" />' +
      '</div>' +
      '<div class="btn-row">' +
        backBtn() +
        '<div class="btn-row-right">' +
          '<button class="btn btn-primary" onclick="window._wizNext4()">Next</button>' +
        '</div>' +
      '</div>';
    return html;
  }

  window._wizGitField = function(field, val) {
    state.config[field] = val;
  };

  window._wizNext4 = function() {
    var c = state.config;
    if (!c.baseBranch) {
      alert("Base branch is required.");
      return;
    }
    if (c.pollInterval < 1) {
      alert("Poll interval must be at least 1 minute.");
      return;
    }
    goNext();
  };

  // ---- Step 5: Select Recipes ----

  var RECIPE_DEFS = [
    { id: "refine", name: "Refine", desc: "Break down cards into acceptance criteria and subtasks using AI analysis." },
    { id: "code", name: "Code", desc: "Implement cards in isolated worktrees, open PRs automatically." },
    { id: "review", name: "Review", desc: "Review PR diffs and post structured feedback on GitHub." },
    { id: "triage", name: "Triage", desc: "Analyze bug reports, identify root causes, write triage reports." },
    { id: "bounce", name: "Bounce", desc: "Move cards with rejected PR reviews back for automated rework." }
  ];

  // Build status name options from discovered statuses
  function statusOptions(selectedName) {
    var statuses = state.discoveredStatuses || [];
    var html = '<option value="">(none -- don\'t move)</option>';
    // Also include common defaults in case discovery hasn't run
    var seen = {};
    for (var i = 0; i < statuses.length; i++) {
      var name = statuses[i].name;
      var sel = (name === selectedName) ? " selected" : "";
      html += '<option value="' + escHtml(name) + '"' + sel + '>' + escHtml(name) + '</option>';
      seen[name] = true;
    }
    // If the current value isn't in the list, add it
    if (selectedName && !seen[selectedName]) {
      html += '<option value="' + escHtml(selectedName) + '" selected>' + escHtml(selectedName) + '</option>';
    }
    return html;
  }

  // Build transition key options from adapter config lane defs
  function transitionOptions(selectedKey) {
    var opts = [
      { key: "", label: "(none -- don't move)" },
      { key: "TODO", label: "To Do" },
      { key: "REFINED", label: "Refined" },
      { key: "AGENT", label: "Agent" },
      { key: "IN_PROGRESS", label: "In Progress" },
      { key: "QA", label: "QA" },
      { key: "DONE", label: "Done" },
      { key: "BACKLOG", label: "Backlog" }
    ];
    var html = "";
    for (var i = 0; i < opts.length; i++) {
      var sel = (opts[i].key === selectedKey) ? " selected" : "";
      html += '<option value="' + opts[i].key + '"' + sel + '>' + escHtml(opts[i].label) + '</option>';
    }
    return html;
  }

  function renderRecipes() {
    var selected = state.config.recipes;
    var routing = state.config.routing;

    var html = '<h2>Select Recipes</h2>' +
      '<p>Enable recipes and configure which lanes they read from and move cards to.</p>' +
      '<div class="checkbox-group">';

    for (var i = 0; i < RECIPE_DEFS.length; i++) {
      var r = RECIPE_DEFS[i];
      var checked = selected.indexOf(r.id) !== -1;
      var route = routing[r.id] || { from: "", to: "" };

      html += '<div class="checkbox-item" style="flex-direction:column;align-items:stretch;cursor:default">' +
        '<div style="display:flex;align-items:flex-start;gap:12px">' +
          '<input type="checkbox" value="' + r.id + '"' + (checked ? " checked" : "") +
            ' onchange="window._wizToggleRecipe(\'' + r.id + '\', this.checked)" style="cursor:pointer" />' +
          '<div class="recipe-info">' +
            '<span class="recipe-name">' + escHtml(r.name) + '</span>' +
            '<span class="recipe-desc">' + escHtml(r.desc) + '</span>' +
          '</div>' +
        '</div>';

      if (checked) {
        html += '<div style="display:flex;gap:12px;margin-top:12px;padding-left:28px">' +
          '<div style="flex:1">' +
            '<label style="font-size:12px;color:var(--text-muted);display:block;margin-bottom:4px">Read from</label>' +
            '<input type="text" value="' + escHtml(route.from) + '" placeholder="Status name" ' +
              'onchange="window._wizRouteField(\'' + r.id + '\', \'from\', this.value)" style="font-size:13px" />' +
          '</div>' +
          '<div style="flex:1">' +
            '<label style="font-size:12px;color:var(--text-muted);display:block;margin-bottom:4px">Move to</label>' +
            '<select onchange="window._wizRouteField(\'' + r.id + '\', \'to\', this.value)" style="font-size:13px">' +
              transitionOptions(route.to) +
            '</select>' +
          '</div>' +
        '</div>';
      }

      html += '</div>';
    }

    html += '</div>' +
      '<div id="recipeMsg" class="msg"></div>' +
      '<div class="btn-row">' +
        backBtn() +
        '<div class="btn-row-right">' +
          '<button class="btn btn-primary" onclick="window._wizNext5()">Next</button>' +
        '</div>' +
      '</div>';
    return html;
  }

  window._wizToggleRecipe = function(id, checked) {
    var idx = state.config.recipes.indexOf(id);
    if (checked && idx === -1) {
      state.config.recipes.push(id);
    } else if (!checked && idx !== -1) {
      state.config.recipes.splice(idx, 1);
    }
    renderCard();
  };

  window._wizRouteField = function(recipe, field, val) {
    if (!state.config.routing[recipe]) {
      state.config.routing[recipe] = { from: "", to: "" };
    }
    state.config.routing[recipe][field] = val;
  };

  window._wizNext5 = function() {
    if (state.config.recipes.length === 0) {
      showMsg("recipeMsg", "error", "Please select at least one recipe.");
      return;
    }
    // Validate that enabled recipes have a FROM lane
    var routing = state.config.routing;
    for (var i = 0; i < state.config.recipes.length; i++) {
      var id = state.config.recipes[i];
      var route = routing[id];
      if (!route || !route.from) {
        showMsg("recipeMsg", "error", "Please set a 'Read from' lane for " + id + ".");
        return;
      }
    }
    goNext();
  };

  // ---- Step 6: Review & Save ----

  function renderReview() {
    var c = state.config;

    var html = '<h2>Review and Save</h2>' +
      '<p>Review your configuration before saving.</p>';

    // Board connection
    html += '<div class="summary-section">' +
      '<h3>Board Connection</h3>' +
      '<table class="summary-table">' +
        '<tr><td>Adapter</td><td>' + escHtml(c.adapter) + '</td></tr>' +
        '<tr><td>Domain</td><td>' + escHtml(c.domain) + '</td></tr>' +
        '<tr><td>Email</td><td>' + escHtml(c.email) + '</td></tr>' +
        '<tr><td>API Token</td><td>' + (c.apiToken ? "********" : "(not set)") + '</td></tr>' +
        '<tr><td>Project Key</td><td>' + escHtml(c.projectKey) + '</td></tr>' +
      '</table></div>';

    // Lanes
    html += '<div class="summary-section">' +
      '<h3>Lane Mapping</h3>' +
      '<table class="summary-table">';
    for (var i = 0; i < LANE_DEFS.length; i++) {
      var ldef = LANE_DEFS[i];
      var lane = c.lanes[ldef.key] || {};
      if (lane.statusId || lane.transitionId) {
        html += '<tr><td>' + escHtml(ldef.label) + '</td><td>Status: ' + escHtml(lane.statusId || "-") + ', Transition: ' + escHtml(lane.transitionId || "-") + '</td></tr>';
      }
    }
    html += '</table></div>';

    // Git settings
    html += '<div class="summary-section">' +
      '<h3>Git Settings</h3>' +
      '<table class="summary-table">' +
        '<tr><td>Base Branch</td><td>' + escHtml(c.baseBranch) + '</td></tr>' +
        '<tr><td>Poll Interval</td><td>' + c.pollInterval + ' minutes</td></tr>' +
        '<tr><td>Max Refine Cards</td><td>' + c.maxRefineCards + '</td></tr>' +
        '<tr><td>Max Code Cards</td><td>' + c.maxCodeCards + '</td></tr>' +
      '</table></div>';

    // Recipes & routing
    html += '<div class="summary-section">' +
      '<h3>Recipes</h3>' +
      '<table class="summary-table">';
    for (var ri = 0; ri < (c.recipes || []).length; ri++) {
      var rid = c.recipes[ri];
      var route = (c.routing || {})[rid] || {};
      var arrow = route.to ? ' --> ' + route.to : ' (stays)';
      html += '<tr><td>' + escHtml(rid) + '</td><td>' + escHtml(route.from || '?') + escHtml(arrow) + '</td></tr>';
    }
    if (!c.recipes || c.recipes.length === 0) {
      html += '<tr><td>Enabled</td><td>none</td></tr>';
    }
    html += '</table></div>';

    html += '<div id="saveMsg" class="msg"></div>' +
      '<div class="btn-row">' +
        backBtn() +
        '<div class="btn-row-right">' +
          '<button class="btn btn-success" onclick="window._wizSave()">Save Configuration</button>' +
        '</div>' +
      '</div>';
    return html;
  }

  window._wizSave = async function() {
    hideMsg("saveMsg");
    showMsg("saveMsg", "info", "Saving configuration...");
    try {
      var c = state.config;
      var env = {
        BOARD_ADAPTER: c.adapter,
        BOARD_DOMAIN: c.domain,
        BOARD_API_TOKEN: c.apiToken,
        BOARD_PROJECT_KEY: c.projectKey,
        BOARD_EMAIL: c.email,
        GIT_BASE_BRANCH: c.baseBranch,
        POLL_INTERVAL: String((c.pollInterval || 60) * 60),
        MAX_CARDS_REFINE: String(c.maxRefineCards || 5),
        MAX_CARDS_CODE: String(c.maxCodeCards || 2),
        RECIPES_ENABLED: (c.recipes || []).join(",")
      };
      // Add recipe lane routing
      var routing = c.routing || {};
      var routeKeys = Object.keys(routing);
      for (var r = 0; r < routeKeys.length; r++) {
        var rid = routeKeys[r].toUpperCase();
        var route = routing[routeKeys[r]];
        if (route.from) env["RECIPE_" + rid + "_FROM"] = route.from;
        env["RECIPE_" + rid + "_TO"] = route.to || "";
      }
      var adapterConfig = {};
      var laneKeys = Object.keys(c.lanes);
      for (var i = 0; i < laneKeys.length; i++) {
        var key = laneKeys[i];
        var lane = c.lanes[key];
        if (lane.statusId) adapterConfig["STATUS_" + key] = lane.statusId;
        if (lane.transitionId) adapterConfig["TRANSITION_" + key] = lane.transitionId;
      }
      var result = await apiPost("/api/save-config", {
        adapter: c.adapter,
        env: env,
        adapterConfig: adapterConfig
      });
      if (!result.success) {
        showMsg("saveMsg", "error", result.message || "Failed to save.");
        return;
      }
      showMsg("saveMsg", "success", "Configuration saved successfully.");
      setTimeout(goNext, 1000);
    } catch(e) {
      showMsg("saveMsg", "error", "Failed to save: " + e.message);
    }
  };

  // ---- Step 7: Running ----

  function renderRunning() {
    var r = state.runner;
    var dotCls = r.running ? "dot-green" : "dot-red";
    var statusLabel = r.running ? "Runner is active" : "Runner is stopped";
    var pidText = r.pid ? "PID: " + r.pid : "No process running";

    var html = '<h2>Runner Dashboard</h2>' +
      '<p>Control the Sorta.Fit automation runner.</p>' +
      '<div class="dashboard-status">' +
        '<span class="dot ' + dotCls + '"></span>' +
        '<div>' +
          '<div class="status-text">' + escHtml(statusLabel) + '</div>' +
          '<div class="dashboard-detail">' + escHtml(pidText) + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="dashboard-controls">';

    if (!r.running) {
      html += '<button class="btn btn-success" onclick="window._wizStartRunner()">Start Runner</button>';
    } else {
      html += '<button class="btn btn-danger" onclick="window._wizStopRunner()">Stop Runner</button>';
    }

    html += '<button class="btn btn-secondary" onclick="window._wizCheckStatus()">Refresh Status</button>' +
      '</div>' +
      '<div id="runnerMsg" class="msg"></div>' +
      '<div class="btn-row">' +
        backBtn() +
        '<span></span>' +
      '</div>';
    return html;
  }

  window._wizStartRunner = async function() {
    hideMsg("runnerMsg");
    showMsg("runnerMsg", "info", "Starting runner...");
    try {
      var data = await apiPost("/api/start-runner");
      state.runner.running = true;
      state.runner.pid = data.pid || null;
      renderCard();
      showMsg("runnerMsg", "success", "Runner started successfully.");
      startStatusPolling();
    } catch(e) {
      showMsg("runnerMsg", "error", "Failed to start runner: " + e.message);
    }
  };

  window._wizStopRunner = async function() {
    hideMsg("runnerMsg");
    showMsg("runnerMsg", "info", "Stopping runner...");
    try {
      await apiPost("/api/stop-runner");
      state.runner.running = false;
      state.runner.pid = null;
      stopStatusPolling();
      renderCard();
      showMsg("runnerMsg", "success", "Runner stopped.");
    } catch(e) {
      showMsg("runnerMsg", "error", "Failed to stop runner: " + e.message);
    }
  };

  window._wizCheckStatus = async function() {
    try {
      var data = await apiPost("/api/runner-status");
      state.runner.running = !!data.running;
      state.runner.pid = data.pid || null;
      renderCard();
    } catch(e) {
      showMsg("runnerMsg", "error", "Failed to fetch status: " + e.message);
    }
  };

  function startStatusPolling() {
    stopStatusPolling();
    state.runner.pollTimer = setInterval(async function() {
      try {
        var data = await apiPost("/api/runner-status");
        state.runner.running = !!data.running;
        state.runner.pid = data.pid || null;
        if (state.currentStep === 7) {
          renderCard();
        }
        if (!state.runner.running) {
          stopStatusPolling();
        }
      } catch(e) { /* silent */ }
    }, 5000);
  }

  function stopStatusPolling() {
    if (state.runner.pollTimer) {
      clearInterval(state.runner.pollTimer);
      state.runner.pollTimer = null;
    }
  }

  // ---- Render ----

  var stepRenderers = [
    renderWelcome,
    renderDeps,
    renderBoard,
    renderLanes,
    renderGit,
    renderRecipes,
    renderReview,
    renderRunning
  ];

  function renderCard() {
    document.getElementById("wizardCard").innerHTML = stepRenderers[state.currentStep]();
  }

  function render() {
    renderStepIndicator();
    renderCard();

    // Auto-trigger dependency check when entering step 1
    if (state.currentStep === 1 && !state.deps) {
      window._wizCheckDeps();
    }

    // Start polling if returning to running step and runner is active
    if (state.currentStep === 7 && state.runner.running) {
      startStatusPolling();
    } else if (state.currentStep !== 7) {
      stopStatusPolling();
    }

    // Auto-check runner status when entering step 7
    if (state.currentStep === 7) {
      window._wizCheckStatus();
    }
  }

  // ---- Init ----

  // Detect file:// protocol and warn the user
  if (window.location.protocol === "file:") {
    document.getElementById("wizardCard").innerHTML =
      '<h2>Server Not Running</h2>' +
      '<p>This page was opened directly from the file system. The setup wizard needs its server running to check dependencies, test connections, and save configuration.</p>' +
      '<p style="margin-top:16px"><strong>To start the server:</strong></p>' +
      '<p><strong>Windows:</strong> Double-click <code style="background:var(--bg);padding:2px 6px;border-radius:3px">setup.bat</code></p>' +
      '<p><strong>macOS / Linux:</strong> Run <code style="background:var(--bg);padding:2px 6px;border-radius:3px">bash setup.sh</code></p>' +
      '<p style="margin-top:16px;color:var(--text-muted)">The server will open this wizard automatically at <code style="background:var(--bg);padding:2px 6px;border-radius:3px">http://localhost:3456</code></p>';
    return;
  }

  render();

})();
</script>
</body>
</html>
